name: SwipeClean
options:
  bundleIdPrefix: com.nosleeplab
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Sources/SwipeClean/Info.plist

targets:
  SwipeClean:
    type: application
    platform: iOS
    sources:
      - path: Sources/SwipeClean
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nosleeplab.SwipeClean
        INFOPLIST_FILE: Sources/SwipeClean/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "SwipeClean needs access to your photo library so you can swipe through photos to keep or delete them."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIRequiresFullScreen: true
    dependencies: []

  SwipeCleanTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/SwipeCleanTests
    dependencies:
      - target: SwipeClean
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nosleeplab.SwipeCleanTests
        GENERATE_INFOPLIST_FILE: true
